<div class="container-fluid px-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Jugadores</h2>
    <div>
      <button class="btn btn-success" [routerLink]="['/detail', 'new']">Añadir Jugador</button>
    </div>
  </div>

  <div *ngIf="(players$ | async) as players; else noPlayers"
       class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-5 g-4">
    <div class="col" *ngFor="let jugador of players | playerFilter:searchText:filterField">
      <div
        [routerLink]="['/detail', jugador.id]"
        class="card h-100 shadow-sm border-2 player-card-hover"
        (click)="$event.stopPropagation()"
        [class.border-primary]="selectedPlayer?.id === jugador.id"
        [class.bg-primary-subtle]="selectedPlayer?.id === jugador.id"
        style="cursor: pointer; border-radius: 10px; transition: 0.2s;"
      >
        <div style="height: 200px; overflow: hidden; border-radius: 8px 8px 0 0;">
          <img
            [src]="jugador.img"
            [alt]="jugador.nombre"
            class="img-fluid w-100 h-100 object-fit-cover"
            style="object-position: top;"
          />
        </div>
        <div class="card-body d-flex flex-column p-4">
          <h5 class="card-title fw-bold mb-3">{{ jugador.nombre }}</h5>
          <div class="d-flex justify-content-between">
            <a
              [routerLink]="['/detail', jugador.id]"
              class="btn btn-purple mt-auto fw-semibold py-2"
              (click)="$event.stopPropagation()"
            >
              Ver detalle
            </a>
            <button class="btn btn-danger mt-auto" (click)="deletePlayer(jugador.id); $event.stopPropagation()">
              <i class="fas fa-trash">Borrar</i>
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <ng-template #noPlayers>
    <div class="alert alert-info shadow-sm" role="alert">
      No hay jugadores disponibles en este momento.
    </div>
  </ng-template>
</div>
